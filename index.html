<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>المسابقة الثقافية</title>

<style>

body {
    margin:0;
    font-family:Tahoma;
    background: radial-gradient(circle, #1a1a2e, #0f0f1a);
    color:white;
    text-align:center;
}

/* INTRO */
#intro {
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#logo {
    font-size:55px;
    color:gold;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow:0 0 10px gold; }
    to { text-shadow:0 0 50px gold; }
}

input {
    padding:10px;
    margin:5px;
}

button {
    padding:12px 25px;
    font-size:18px;
    cursor:pointer;
}

/* GAME */
#game { display:none; }

/* SCOREBOARD */
#scoreboard {
    display:flex;
    justify-content:space-around;
    background:#111;
    padding:15px;
    border-bottom:3px solid gold;
}

.team {
    border:2px solid gold;
    padding:10px 20px;
    border-radius:10px;
}

.team span {
    font-weight:bold;
    font-size:22px;
}

.active {
    background:gold;
    color:black;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:15px;
    padding:20px;
}

.box {
    background:#111;
    border:3px solid gold;
    padding:35px;
    font-size:28px;
    border-radius:10px;
    cursor:pointer;
}

.box:hover {
    transform:scale(1.1);
    background:gold;
    color:black;
}

.box.used {
    background:#444;
    color:#888;
}

/* POPUP */
#popup {
    display:none;
    position:fixed;
    top:10%;
    left:10%;
    width:80%;
    background:#0f0f1a;
    border:4px solid gold;
    padding:30px;
    box-shadow:0 0 30px gold;
}

#timer {
    font-size:60px;
    color:gold;
}

.danger {
    color:red !important;
    transform:scale(1.2);
}

#questionImage {
    max-width:300px;
    margin:10px;
}

/* ANSWERS */
.answer {
    margin:10px;
    padding:15px;
    background:#1a1a2e;
    border:2px solid gold;
    cursor:pointer;
    border-radius:10px;
}

.answer:hover {
    background:gold;
    color:black;
}

/* FEEDBACK */
#feedback {
    position:fixed;
    width:100%;
    height:100%;
    display:none;
    font-size:80px;
    justify-content:center;
    align-items:center;
}

.correct { background:rgba(0,200,0,0.9); }
.wrong { background:rgba(200,0,0,0.9); }

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <div id="logo">🎤 المسابقة الثقافية 🎤</div>

    <div>
        <input id="team1Name" placeholder="اسم الفريق 1">
        <input id="team2Name" placeholder="اسم الفريق 2">
    </div>

    <button onclick="startGame()">ابدأ المسابقة</button>
</div>

<!-- GAME -->
<div id="game">
    <div id="scoreboard"></div>
    <button onclick="nextTurn()">▶ التالي</button>
    <div class="grid" id="grid"></div>
</div>

<!-- POPUP -->
<div id="popup">
    <div id="timer">60</div>
    <h2 id="question"></h2>
    <img id="questionImage">
    <div id="answers"></div>
</div>

<div id="feedback"></div>

<!-- SOUNDS -->
<audio id="introSound" src="sounds/intro.mp3"></audio>
<audio id="bgSound" src="sounds/bg.mp3" loop></audio>
<audio id="tickSound" src="sounds/tick.mp3"></audio>
<audio id="correctSound" src="sounds/correct.mp3"></audio>
<audio id="wrongSound" src="sounds/wrong.mp3"></audio>
<audio id="timeoutSound" src="sounds/timeout.mp3"></audio>
<audio id="winSound" src="sounds/win.mp3"></audio>

<script>

let questions=[];
let scores=[0,0,0];
let currentTeam=1;

let timer;
let timeLeft=60;

/* LOAD QUESTIONS */
fetch("questions.json")
.then(res=>res.json())
.then(data=>{
    questions=data;
    createGrid();
});

/* AUDIO FADE */
function fadeAudio(audio, target, duration){
    let step = (audio.volume - target) / (duration/50);
    let interval = setInterval(()=>{
        audio.volume -= step;
        if((step>0 && audio.volume<=target) || (step<0 && audio.volume>=target)){
            audio.volume = target;
            clearInterval(interval);
        }
    },50);
}

/* START */
function startGame(){

    let intro = document.getElementById("introSound");
    let bg = document.getElementById("bgSound");

    intro.volume = 1;
    intro.play();

    setTimeout(()=>{
        fadeAudio(intro, 0, 1000);
        bg.volume = 0;
        bg.play();
        fadeAudio(bg, 0.5, 2000);
    },1500);

    document.getElementById("intro").style.display="none";
    document.getElementById("game").style.display="block";

    let names=[
        team1Name.value||"الفريق 1",
        team2Name.value||"الفريق 2",
        team3Name.value||"الفريق 3"
    ];

    let board=document.getElementById("scoreboard");
    board.innerHTML="";

    names.forEach((n,i)=>{
        let d=document.createElement("div");
        d.className="team";
        d.id="t"+(i+1);
        d.innerHTML=n+": <span>0</span>";
        board.appendChild(d);
    });

    updateActiveTeam();
}

/* GRID */
function createGrid(){
    let grid=document.getElementById("grid");
    questions.forEach((q,i)=>{
        let box=document.createElement("div");
        box.className="box";
        box.innerText=i+1;
        box.onclick=()=>openQuestion(i,box);
        grid.appendChild(box);
    });
}

/* OPEN */
function openQuestion(i,box){
    if(box.classList.contains("used")) return;

    let q=questions[i];

    popup.style.display="block";
    question.innerText=q.question;

    if(q.image){
        questionImage.src=q.image;
        questionImage.style.display="block";
    } else questionImage.style.display="none";

    answers.innerHTML="";
    q.options.forEach((opt,idx)=>{
        let btn=document.createElement("div");
        btn.className="answer";
        btn.innerText=opt;
        btn.onclick=()=>checkAnswer(idx,q.correct,box);
        answers.appendChild(btn);
    });

    startTimer(box);
}

/* TIMER */
function startTimer(box){
    let timerEl=document.getElementById("timer");

    timeLeft=60;
    timerEl.innerText=timeLeft;
    timerEl.classList.remove("danger");

    clearInterval(timer);

    timer=setInterval(()=>{
        timeLeft--;
        timerEl.innerText=timeLeft;

        let tick=document.getElementById("tickSound");
        tick.currentTime=0;
        tick.play();

        if(timeLeft<=10) timerEl.classList.add("danger");

        if(timeLeft<=0){
            clearInterval(timer);
            timeUp(box);
        }

    },1000);
}

/* TIME UP */
function timeUp(box){
    popup.style.display="none";

    feedback.className="wrong";
    feedback.innerText="⏰ انتهى الوقت!";
    feedback.style.display="flex";

    timeoutSound.play();

    setTimeout(()=>feedback.style.display="none",2000);

    box.classList.add("used");
    updateActiveTeam();
    checkEnd();
}

/* ANSWER */
function checkAnswer(sel,correct,box){
    clearInterval(timer);

    popup.style.display="none";

    if(sel===correct){
        scores[currentTeam-1]++;
        document.querySelector("#t"+currentTeam+" span").innerText=scores[currentTeam-1];

        feedback.className="correct";
        feedback.innerText="✔ صحيح!";
        correctSound.play();
    } else {
        feedback.className="wrong";
        feedback.innerText="✖ خطأ!";
        wrongSound.play();
    }

    feedback.style.display="flex";
    setTimeout(()=>feedback.style.display="none",2000);

    box.classList.add("used");
    updateActiveTeam();
    checkEnd();
}

/* NEXT TURN */
function nextTurn(){
    currentTeam=currentTeam%3+1;
    updateActiveTeam();
}

/* ACTIVE */
function updateActiveTeam(){
    for(let i=1;i<=3;i++){
        let t=document.getElementById("t"+i);
        if(t) t.classList.remove("active");
    }
    let current=document.getElementById("t"+currentTeam);
    if(current) current.classList.add("active");
}

/* END */
function checkEnd(){
    let used=document.querySelectorAll(".box.used").length;
    if(used===questions.length) showWinner();
}

/* WINNER */
function showWinner(){
    let max=Math.max(...scores);
    let winner=scores.indexOf(max)+1;

    feedback.className="correct";
    feedback.innerText="🏆 الفريق "+winner+" هو الفائز!";
    feedback.style.display="flex";

    winSound.play();
}

</script>

</body>
</html>
