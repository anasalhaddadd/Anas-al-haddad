<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مسابقة التحدي — Quiz Show</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Barlow+Condensed:wght@400;600;700;800&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS ── */
:root {
  --black:   #05050f;
  --deep:    #08081a;
  --navy:    #0e0e2a;
  --panel:   #111128;
  --gold:    #f5c518;
  --gold2:   #e8a000;
  --amber:   #ff8c00;
  --correct: #00e887;
  --wrong:   #ff2d55;
  --team-a:  #00c8ff;
  --team-b:  #00e065;
  --border:  rgba(245,197,24,0.18);
  --glow:    rgba(245,197,24,0.12);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--black);
  color: #fff;
  font-family: 'Cairo', 'Barlow Condensed', sans-serif;
  overflow-x: hidden;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
  pointer-events: none;
  z-index: 9999;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 15% 50%, rgba(0,200,255,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 85% 50%, rgba(0,224,101,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 80% 30% at 50% 0%,  rgba(245,197,24,0.07) 0%, transparent 55%);
  pointer-events: none;
  z-index: 0;
}

.screen { display: none; position: relative; z-index: 1; }
.screen.active { display: flex; }

/* ════════════ SETUP ════════════ */
#setup {
  min-height: 100vh;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 20px;
  gap: 0;
}
.show-logo {
  text-align: center;
  margin-bottom: 36px;
}
.show-logo .main-title {
  font-family: 'Cairo', 'Black Ops One', sans-serif;
  font-size: clamp(42px, 10vw, 90px);
  font-weight: 900;
  line-height: 0.95;
  letter-spacing: 4px;
  background: linear-gradient(180deg, #fff 0%, var(--gold) 40%, var(--amber) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 30px rgba(245,197,24,0.35));
}
.show-logo .sub {
  font-size: 12px;
  font-weight: 900;
  letter-spacing: 8px;
  text-transform: uppercase;
  color: rgba(245,197,24,0.45);
  margin-top: 8px;
  font-family: 'Cairo', sans-serif;
}
.show-logo .school-name {
  font-family: 'Cairo', sans-serif;
  font-size: clamp(15px, 3vw, 22px);
  font-weight: 700;
  color: rgba(255,255,255,0.75);
  margin-top: 10px;
  letter-spacing: 1px;
  text-shadow: 0 0 20px rgba(245,197,24,0.2);
}
.setup-box {
  background: linear-gradient(145deg, var(--panel) 0%, var(--deep) 100%);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 36px 40px;
  width: 100%;
  max-width: 480px;
  box-shadow: 0 0 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
}
.setup-box h2 {
  font-family: 'Cairo', sans-serif;
  font-size: 18px;
  font-weight: 900;
  letter-spacing: 3px;
  color: var(--gold);
  text-align: center;
  margin-bottom: 28px;
}
.f { margin-bottom: 22px; }
.f label {
  display: block;
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 3px;
  color: rgba(245,197,24,0.55);
  margin-bottom: 8px;
  font-family: 'Cairo', sans-serif;
}
.f input[type=text] {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 11px 14px;
  color: #fff;
  font-family: 'Cairo', 'Barlow Condensed', sans-serif;
  font-size: 16px;
  font-weight: 700;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  direction: rtl;
}
.f input[type=text]:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(245,197,24,0.1); }
.team-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.team-badge {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Black Ops One', sans-serif;
  font-size: 14px;
  flex-shrink: 0;
}
.btn-start {
  width: 100%;
  margin-top: 4px;
  background: linear-gradient(135deg, var(--gold) 0%, var(--amber) 100%);
  color: #000;
  border: none;
  border-radius: 10px;
  padding: 16px;
  font-family: 'Cairo', sans-serif;
  font-size: 18px;
  font-weight: 900;
  letter-spacing: 4px;
  cursor: pointer;
  transition: filter 0.2s, transform 0.1s;
  box-shadow: 0 4px 20px rgba(245,197,24,0.25);
}
.btn-start:hover { filter: brightness(1.1); transform: translateY(-1px); }
.btn-start:active { transform: translateY(1px); }

/* Music upload row in setup */
.music-row {
  margin-top: 18px;
  background: rgba(245,197,24,0.04);
  border: 1px dashed rgba(245,197,24,0.2);
  border-radius: 10px;
  padding: 14px 16px;
}
.music-row label {
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 2px;
  color: rgba(245,197,24,0.5);
  display: block;
  margin-bottom: 8px;
  font-family: 'Cairo', sans-serif;
}
.music-row input[type=file] {
  width: 100%;
  color: rgba(255,255,255,0.5);
  font-size: 12px;
  font-family: 'Cairo', sans-serif;
}

/* ════════════ GAME HEADER ════════════ */
#game {
  min-height: 100vh;
  flex-direction: column;
  padding: 0;
}
.game-header {
  display: flex;
  align-items: stretch;
  height: 80px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, var(--deep) 0%, rgba(8,8,26,0.95) 100%);
  position: sticky;
  top: 0;
  z-index: 10;
}
.team-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 20px;
  transition: background 0.4s;
  position: relative;
  overflow: hidden;
}
.team-panel::before {
  content: '';
  position: absolute; inset: 0;
  opacity: 0;
  transition: opacity 0.4s;
}
.team-panel.team-a::before { background: linear-gradient(135deg, rgba(0,200,255,0.1) 0%, transparent 70%); }
.team-panel.team-b::before { background: linear-gradient(225deg, rgba(0,224,101,0.1) 0%, transparent 70%); }
.team-panel.active::before { opacity: 1; }
.team-panel .t-label { font-size: 10px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; opacity: 0.5; margin-bottom: 2px; font-family: 'Cairo', sans-serif; }
.team-panel.team-a .t-label { color: var(--team-a); }
.team-panel.team-b .t-label { color: var(--team-b); }
.team-panel .t-name { font-family: 'Cairo', 'Black Ops One', sans-serif; font-size: clamp(14px, 2.5vw, 20px); font-weight: 900; letter-spacing: 1px; }
.team-panel.team-a .t-name { color: var(--team-a); }
.team-panel.team-b .t-name { color: var(--team-b); }
.team-panel .t-score { font-family: 'Black Ops One', sans-serif; font-size: clamp(28px, 5vw, 40px); line-height: 1; }
.team-panel.active .t-score { text-shadow: 0 0 20px currentColor; }
.header-center {
  width: 160px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  gap: 2px;
}
.header-center .hc-title { font-family: 'Cairo', sans-serif; font-size: 10px; font-weight: 900; letter-spacing: 3px; color: var(--gold); opacity: 0.7; }
.header-center .hc-count { font-family: 'Black Ops One', sans-serif; font-size: 28px; color: var(--gold); line-height: 1; }
.header-center .hc-sub { font-size: 10px; letter-spacing: 2px; color: rgba(255,255,255,0.3); font-family: 'Cairo', sans-serif; }
.turn-arrow { position: absolute; bottom: 6px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; opacity: 0; transition: opacity 0.3s; font-family: 'Cairo', sans-serif; }
.team-panel.active .turn-arrow { opacity: 1; }
.team-panel.team-a .turn-arrow { color: var(--team-a); left: 12px; }
.team-panel.team-b .turn-arrow { color: var(--team-b); right: 12px; }
.progress-strip { height: 3px; background: rgba(255,255,255,0.05); position: relative; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--team-a), var(--gold), var(--team-b)); transition: width 0.5s ease; width: 0%; }

/* ════════════ 3D CUBE BOARD ════════════ */
.board-wrap {
  flex: 1;
  padding: 24px 20px 24px;
  display: flex;
  flex-direction: column;
  position: relative;
}
/* Board background image — set via JS or paste URL in CFG_BOARD_BG */
.board-wrap.has-bg {
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}
.board-wrap.has-bg::before {
  content: '';
  position: absolute; inset: 0;
  background: rgba(5,5,15,0.55);
  pointer-events: none;
  z-index: 0;
}
.board-wrap .board { position: relative; z-index: 1; }
.board {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 14px;
  max-width: 960px;
  margin: 0 auto;
  width: 100%;
}

/* 3D Cube cell */
.q-cell {
  aspect-ratio: 1;
  perspective: 400px;
  cursor: pointer;
  user-select: none;
  position: relative;
}
.q-cell.done { cursor: default; }

.cube-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.65s cubic-bezier(0.34,1.2,0.64,1);
  border-radius: 12px;
}
.q-cell:hover:not(.done) .cube-inner {
  transform: rotateX(-12deg) rotateY(12deg) translateY(-4px);
}
.cube-face {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  backface-visibility: hidden;
}
/* Front face */
.cube-front {
  background: linear-gradient(145deg, #1a1a3a 0%, #0e0e28 100%);
  border: 1px solid rgba(245,197,24,0.22);
  box-shadow:
    0 8px 0 rgba(0,0,0,0.4),
    inset 0 1px 0 rgba(255,255,255,0.08),
    inset 0 0 20px rgba(245,197,24,0.04);
  font-family: 'Black Ops One', sans-serif;
  font-size: clamp(14px, 2.2vw, 24px);
  color: rgba(245,197,24,0.8);
  letter-spacing: 1px;
}
/* Right face (3D side) */
.cube-right {
  transform: rotateY(90deg) translateZ(calc(50% - 4px));
  width: 8px;
  right: -8px;
  left: auto;
  background: linear-gradient(180deg, rgba(245,197,24,0.15) 0%, rgba(245,197,24,0.04) 100%);
  border-radius: 0 4px 4px 0;
  border: none;
}
/* Bottom face (3D side) */
.cube-bottom {
  transform: rotateX(-90deg) translateZ(calc(50% - 4px));
  height: 8px;
  bottom: -8px;
  top: auto;
  background: linear-gradient(90deg, rgba(245,197,24,0.1) 0%, rgba(245,197,24,0.03) 100%);
  border-radius: 0 0 4px 4px;
  border: none;
}

.q-cell:hover:not(.done) .cube-front {
  border-color: rgba(245,197,24,0.55);
  box-shadow: 0 12px 0 rgba(0,0,0,0.5), 0 0 24px rgba(245,197,24,0.18), inset 0 1px 0 rgba(255,255,255,0.12);
  color: var(--gold);
}

/* answered states */
.q-cell.won-a .cube-front {
  background: linear-gradient(145deg, rgba(0,200,255,0.14) 0%, rgba(0,80,140,0.1) 100%);
  border-color: rgba(0,200,255,0.45);
  color: var(--team-a);
  font-size: clamp(10px, 1.8vw, 16px);
  letter-spacing: 0;
  box-shadow: 0 8px 0 rgba(0,0,0,0.35), 0 0 18px rgba(0,200,255,0.15), inset 0 1px 0 rgba(0,200,255,0.1);
}
.q-cell.won-b .cube-front {
  background: linear-gradient(145deg, rgba(0,224,101,0.14) 0%, rgba(0,140,60,0.1) 100%);
  border-color: rgba(0,224,101,0.45);
  color: var(--team-b);
  font-size: clamp(10px, 1.8vw, 16px);
  letter-spacing: 0;
  box-shadow: 0 8px 0 rgba(0,0,0,0.35), 0 0 18px rgba(0,224,101,0.15), inset 0 1px 0 rgba(0,224,101,0.1);
}
.q-cell.skipped .cube-front {
  background: rgba(255,255,255,0.02);
  border-color: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.15);
  box-shadow: 0 4px 0 rgba(0,0,0,0.2);
}

/* ── Box open animation ── */
@keyframes cubeOpen {
  0%   { transform: rotateX(0deg) rotateY(0deg) scale(1); }
  20%  { transform: rotateX(-25deg) rotateY(20deg) scale(1.08); }
  45%  { transform: rotateX(15deg) rotateY(-15deg) scale(1.12); }
  70%  { transform: rotateX(-8deg) rotateY(8deg) scale(1.06); }
  100% { transform: rotateX(0deg) rotateY(0deg) scale(1); }
}
.q-cell.opening .cube-inner {
  animation: cubeOpen 0.7s cubic-bezier(0.34,1.4,0.64,1) forwards;
}

/* ════════════ TIMER ════════════ */
.timer-ring-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
}
.timer-ring {
  position: relative;
  width: 70px;
  height: 70px;
}
.timer-ring svg {
  transform: rotate(-90deg);
  position: absolute;
  top: 0; left: 0;
}
.timer-ring .ring-bg {
  fill: none;
  stroke: rgba(255,255,255,0.07);
  stroke-width: 5;
}
.timer-ring .ring-fill {
  fill: none;
  stroke: var(--gold);
  stroke-width: 5;
  stroke-linecap: round;
  stroke-dasharray: 188.5;
  stroke-dashoffset: 0;
  transition: stroke-dashoffset 0.9s linear, stroke 0.3s;
}
.timer-ring .ring-fill.urgent { stroke: var(--wrong); }
.timer-num {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Black Ops One', sans-serif;
  font-size: 26px;
  color: var(--gold);
  transition: color 0.3s;
  z-index: 2;
}
.timer-num.urgent { color: var(--wrong); }

@keyframes timerPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.18); }
  100% { transform: scale(1); }
}
.timer-num.tick { animation: timerPulse 0.25s ease; }

/* ════════════ MODAL ════════════ */
.overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(8px);
}
.overlay.open { display: flex; }
.modal {
  background: linear-gradient(160deg, var(--panel) 0%, var(--deep) 100%);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 0;
  max-width: 640px;
  width: 100%;
  overflow: hidden;
  animation: popIn 0.38s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 0 80px rgba(0,0,0,0.7), 0 0 40px rgba(245,197,24,0.08);
}
@keyframes popIn {
  from { opacity: 0; transform: scale(0.65) translateY(30px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-header {
  padding: 18px 24px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-num { font-family: 'Cairo', sans-serif; font-size: 12px; font-weight: 900; letter-spacing: 4px; color: rgba(245,197,24,0.5); }
.modal-close-btn {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.4);
  cursor: pointer;
  font-size: 16px;
  transition: all 0.2s;
  line-height: 1;
}
.modal-close-btn:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
.modal-body { padding: 20px 24px; }

/* Question image */
.modal-q-img {
  width: 100%;
  max-height: 200px;
  object-fit: cover;
  border-radius: 12px;
  margin-bottom: 16px;
  display: none;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
}
.modal-q-img.visible { display: block; }

.modal-q {
  font-size: clamp(17px, 3vw, 24px);
  font-weight: 700;
  line-height: 1.4;
  color: #fff;
  margin-bottom: 20px;
  font-family: 'Cairo', sans-serif;
  direction: rtl;
}
.team-strip { display: flex; gap: 10px; margin-bottom: 18px; }
.t-pick {
  flex: 1;
  padding: 10px 14px;
  border-radius: 10px;
  border: 2px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.5);
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  font-weight: 900;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.t-pick.pick-a { color: var(--team-a); }
.t-pick.pick-b { color: var(--team-b); }
.t-pick.pick-a.chosen { border-color: var(--team-a); background: rgba(0,200,255,0.1); box-shadow: 0 0 16px rgba(0,200,255,0.2); }
.t-pick.pick-b.chosen { border-color: var(--team-b); background: rgba(0,224,101,0.1); box-shadow: 0 0 16px rgba(0,224,101,0.2); }

.opts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.opt {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 12px 14px;
  color: #fff;
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  text-align: right;
  display: flex;
  align-items: center;
  gap: 10px;
  direction: rtl;
}
.opt:hover:not(:disabled) {
  background: rgba(245,197,24,0.08);
  border-color: rgba(245,197,24,0.4);
  transform: translateX(-4px);
}
.opt-key {
  width: 28px; height: 28px;
  border-radius: 7px;
  background: rgba(245,197,24,0.1);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Black Ops One', sans-serif;
  font-size: 13px;
  color: var(--gold);
  flex-shrink: 0;
  transition: background 0.2s;
}
.opt.correct { background: rgba(0,232,135,0.12); border-color: var(--correct); color: var(--correct); animation: correctPulse 0.4s ease; }
.opt.correct .opt-key { background: rgba(0,232,135,0.2); color: var(--correct); }
@keyframes correctPulse { 0% { transform: scale(1); } 40% { transform: scale(1.03); } 100% { transform: scale(1); } }
.opt.wrong { background: rgba(255,45,85,0.1); border-color: var(--wrong); color: rgba(255,45,85,0.8); }
.opt.wrong .opt-key { background: rgba(255,45,85,0.15); color: var(--wrong); }
.opt:disabled { cursor: default; }

/* ANSWERING TEAM label */
.answering-label {
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 3px;
  color: rgba(245,197,24,0.4);
  margin-bottom: 10px;
  font-family: 'Cairo', sans-serif;
}

/* ════════════ FLASH ════════════ */
.flash-screen {
  position: fixed; inset: 0;
  z-index: 200;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.25s;
}
.flash-screen.show { opacity: 1; }
.flash-screen.hide { opacity: 0; transition: opacity 0.4s; }
.flash-bg-layer { position: absolute; inset: 0; transition: background 0.1s; }
.flash-content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 20px; }
.flash-img { max-width: 300px; max-height: 260px; border-radius: 18px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); object-fit: cover; display: none; animation: imgPop 0.45s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes imgPop { from { transform: scale(0.4) rotate(-6deg); opacity: 0; } to { transform: scale(1) rotate(0deg); opacity: 1; } }
.flash-label { font-family: 'Cairo', 'Black Ops One', sans-serif; font-size: clamp(48px, 12vw, 100px); font-weight: 900; letter-spacing: 4px; line-height: 1; animation: labelPop 0.4s 0.08s cubic-bezier(0.34,1.56,0.64,1) both; text-align: center; }
@keyframes labelPop { from { transform: scale(0.3); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  if (bgAudio.paused) {
    bgAudio.play().catch(()=>{});
    fab.textContent = '🔊';
    fab.classList.add('playing');
  } else {
    bgAudio.pause();
    fab.textContent = '🎵';
    fab.classList.remove('playing');
  }
}

function startGame() {
  G = {
    nameA: document.getElementById('name-a').value.trim() || 'الفريق الأول',
    nameB: document.getElementById('name-b').value.trim() || 'الفريق الثاني',
    scoreA: 0,
    scoreB: 0,
    answered: {},
    activeTeam: 'a',
    activeQ: null,
    total: 30,
  };
  document.getElementById('hname-a').textContent = G.nameA;
  document.getElementById('hname-b').textContent = G.nameB;
  document.getElementById('hscore-a').textContent = '0';
  document.getElementById('hscore-b').textContent = '0';
  document.getElementById('hc-remaining').textContent = '30';
  document.getElementById('progress-fill').style.width = '0%';
  setPanelTurn('a');
  buildBoard();
  buildEditor();

  // Apply board background image
  const bw = document.querySelector('.board-wrap');
  const bgSrc = boardBgBlob || CFG_BOARD_BG;
  if (bgSrc) {
    bw.style.backgroundImage = `url('${bgSrc}')`;
    bw.classList.add('has-bg');
  } else {
    bw.style.backgroundImage = '';
    bw.classList.remove('has-bg');
  }

  showScreen('game');

  // start background music if loaded
  const bgAudio = document.getElementById('snd-bg');
  if (bgAudio.src && bgAudio.src !== window.location.href) {
    bgAudio.play().catch(()=>{});
    document.getElementById('music-fab').style.display = 'flex';
    document.getElementById('music-fab').textContent = '🔊';
  }
}

/* ── BOARD ── */
function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  for (let i = 0; i < 30; i++) {
    const cell = document.createElement('div');
    cell.className = 'q-cell';
    cell.id = `cell-${i}`;
    cell.innerHTML = `
      <div class="cube-inner">
        <div class="cube-face cube-front">${i + 1}</div>
        <div class="cube-face cube-right"></div>
        <div class="cube-face cube-bottom"></div>
      </div>`;
    cell.addEventListener('click', () => openQ(i));
    board.appendChild(cell);
  }
}

function setPanelTurn(team) {
  document.getElementById('panel-a').classList.toggle('active', team === 'a');
  document.getElementById('panel-b').classList.toggle('active', team === 'b');
}

/* ── DRUM BURST ── */
function drumBurst(x, y) {
  const colors = ['#f5c518','#ff8c00','#00c8ff','#ff4eb8','#00e887'];
  for (let i = 0; i < 14; i++) {
    const el = document.createElement('div');
    el.className = 'drum-particle';
    const angle = (i / 14) * Math.PI * 2;
    const dist = 40 + Math.random() * 60;
    el.style.cssText = `
      left:${x}px; top:${y}px;
      background:${colors[i % colors.length]};
      --tx:${Math.cos(angle)*dist}px;
      --ty:${Math.sin(angle)*dist}px;
      animation-duration:${0.4 + Math.random()*0.3}s;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 800);
  }
}

/* ── TICK SOUND (Web Audio) ── */
let audioCtx = null;
function playTick(urgent) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(urgent ? 880 : 660, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.1);
  } catch(e) {}
}

function playDrumOpen() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Drum hit: bass + noise burst
    for (let i = 0; i < 3; i++) {
      setTimeout(() => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(200 - i*30, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.18);
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.22);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.25);
      }, i * 90);
    }
  } catch(e) {}
}

/* ── TIMER ── */
function startTimer() {
  clearInterval(timerInterval);
  timerRemaining = TIMER_SECONDS;
  updateTimerUI(timerRemaining);

  timerInterval = setInterval(() => {
    timerRemaining--;
    updateTimerUI(timerRemaining);
    playTick(timerRemaining <= 2);

    if (timerRemaining <= 0) {
      clearInterval(timerInterval);
      // auto-close on timeout
      const opts = document.querySelectorAll('.opt');
      opts.forEach(b => b.disabled = true);
      const q = QUESTIONS[G.activeQ] || { correct: 0 };
      opts[q.correct]?.classList.add('correct');
      setTimeout(() => {
        // mark as missed
        G.answered[G.activeQ] = 'x';
        const cell = document.getElementById(`cell-${G.activeQ}`);
        cell.classList.add('done', 'skipped');
        cell.querySelector('.cube-front').textContent = '✕';
        G.activeTeam = G.activeTeam === 'a' ? 'b' : 'a';
        setPanelTurn(G.activeTeam);
        const doneCount = Object.keys(G.answered).length;
        document.getElementById('hc-remaining').textContent = 30 - doneCount;
        document.getElementById('progress-fill').style.width = (doneCount / 30 * 100) + '%';
        closeModal();
        if (doneCount === 30) setTimeout(showResults, 1500);
      }, 700);
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
}

function updateTimerUI(secs) {
  const numEl = document.getElementById('timer-num');
  const fill = document.getElementById('ring-fill');
  numEl.textContent = Math.max(0, secs);

  const pct = secs / TIMER_SECONDS;
  const offset = CIRCUMFERENCE * (1 - pct);
  fill.style.strokeDashoffset = offset;

  const urgent = secs <= 2;
  fill.classList.toggle('urgent', urgent);
  numEl.classList.toggle('urgent', urgent);

  // tick pulse
  numEl.classList.remove('tick');
  void numEl.offsetWidth;
  numEl.classList.add('tick');
}

/* ── MODAL ── */
function openQ(idx) {
  if (G.answered[idx] !== undefined) return;
  G.activeQ = idx;
  const q = QUESTIONS[idx] || { q:`سؤال ${idx+1}`, opts:['أ','ب','ج','د'], correct:0, img:'' };

  // Cube open animation + drum
  const cell = document.getElementById(`cell-${idx}`);
  const rect = cell.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  cell.classList.add('opening');
  setTimeout(() => cell.classList.remove('opening'), 750);
  drumBurst(cx, cy);
  playDrumOpen();

  document.getElementById('m-num').textContent = `سؤال ${idx + 1}`;
  document.getElementById('m-q').textContent = q.q;

  // Question image
  const imgEl = document.getElementById('m-q-img');
  if (q.img) {
    imgEl.src = q.img;
    imgEl.classList.add('visible');
  } else {
    imgEl.src = '';
    imgEl.classList.remove('visible');
  }

  // Team buttons
  const ts = document.getElementById('m-teams');
  ts.innerHTML = '';
  ['a','b'].forEach(t => {
    const btn = document.createElement('button');
    btn.className = `t-pick pick-${t}${G.activeTeam === t ? ' chosen' : ''}`;
    btn.textContent = t === 'a' ? G.nameA : G.nameB;
    btn.onclick = () => {
      G.activeTeam = t;
      document.querySelectorAll('.t-pick').forEach((b, i) => {
        b.classList.toggle('chosen', ['a','b'][i] === t);
      });
    };
    ts.appendChild(btn);
  });

  // Options
  const og = document.getElementById('m-opts');
  og.innerHTML = '';
  const keys = ['أ','ب','ج','د'];
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-key">${keys[i]}</span><span>${opt}</span>`;
    btn.onclick = () => pickAnswer(idx, i);
    og.appendChild(btn);
  });

  document.getElementById('overlay').classList.add('open');

  // Start timer after a brief pause for animation
  setTimeout(() => startTimer(), 400);
}

function closeModal() {
  stopTimer();
  document.getElementById('overlay').classList.remove('open');
}

function pickAnswer(qIdx, chosen) {
  stopTimer();
  const q = QUESTIONS[qIdx] || { correct: 0 };
  const isCorrect = chosen === q.correct;
  const team = G.activeTeam;

  document.querySelectorAll('.opt').forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct) btn.classList.add('correct');
    else if (i === chosen && !isCorrect) btn.classList.add('wrong');
  });

  if (isCorrect) {
    if (team === 'a') { G.scoreA++; document.getElementById('hscore-a').textContent = G.scoreA; }
    else              { G.scoreB++; document.getElementById('hscore-b').textContent = G.scoreB; }
  }

  G.answered[qIdx] = isCorrect ? team : 'x';
  const cell = document.getElementById(`cell-${qIdx}`);
  if (isCorrect) {
    cell.classList.add('done', `won-${team}`);
    const short = (team === 'a' ? G.nameA : G.nameB).substring(0, 6);
    cell.querySelector('.cube-front').textContent = short;
  } else {
    cell.classList.add('done', 'skipped');
    cell.querySelector('.cube-front').textContent = '✕';
  }

  G.activeTeam = G.activeTeam === 'a' ? 'b' : 'a';
  setPanelTurn(G.activeTeam);

  const doneCount = Object.keys(G.answered).length;
  document.getElementById('hc-remaining').textContent = 30 - doneCount;
  document.getElementById('progress-fill').style.width = (doneCount / 30 * 100) + '%';

  setTimeout(() => {
    closeModal();
    showFlash(isCorrect, team);
    if (doneCount === 30) setTimeout(showResults, 2800);
  }, 700);
}

/* ── FLASH ── */
function showFlash(isCorrect, team) {
  const el    = document.getElementById('flash');
  const bg    = document.getElementById('flash-bg');
  const lbl   = document.getElementById('flash-label');
  const sub   = document.getElementById('flash-team');
  const img   = document.getElementById('flash-img');
  const color = isCorrect ? 'var(--correct)' : 'var(--wrong)';
  const tname = team === 'a' ? G.nameA : G.nameB;

  bg.style.background = isCorrect
    ? 'radial-gradient(circle at 50% 40%, rgba(0,232,135,0.22) 0%, rgba(0,0,0,0.75) 70%)'
    : 'radial-gradient(circle at 50% 40%, rgba(255,45,85,0.22) 0%, rgba(0,0,0,0.75) 70%)';

  lbl.textContent = isCorrect ? '✅ إجابة صحيحة!' : '❌ إجابة خاطئة!';
  lbl.style.color = color;
  sub.textContent = isCorrect ? `+1 نقطة لـ ${tname}` : `لا توجد نقطة`;
  sub.style.color = isCorrect ? (team === 'a' ? COLORS.a : COLORS.b) : 'rgba(255,255,255,0.4)';

  const imgUrl = isCorrect ? CFG_CORRECT_IMAGE : CFG_WRONG_IMAGE;
  if (imgUrl) { img.src = imgUrl; img.style.display = 'block'; }
  else img.style.display = 'none';

  const snd = document.getElementById(isCorrect ? 'snd-correct' : 'snd-wrong');
  const sndUrl = isCorrect ? CFG_CORRECT_SOUND : CFG_WRONG_SOUND;
  if (sndUrl) { snd.src = sndUrl; snd.play().catch(()=>{}); }

  el.classList.remove('hide');
  el.classList.add('show');
  setTimeout(() => {
    el.classList.add('hide');
    setTimeout(() => el.classList.remove('show','hide'), 400);
  }, 1900);
}

/* ── RESULTS ── */
function showResults() {
  const aWins = G.scoreA > G.scoreB;
  const tie   = G.scoreA === G.scoreB;
  document.getElementById('winner-line').textContent = tie
    ? "تعادل!"
    : `🥇 ${aWins ? G.nameA : G.nameB} يفوز بالتحدي!`;

  const podium = document.getElementById('vs-results');
  podium.innerHTML = '';

  const makeCard = (name, score, color, isWinner) => {
    const div = document.createElement('div');
    div.className = 'result-card' + (isWinner && !tie ? ' winner' : '');
    div.style.borderColor = color + '55';
    div.innerHTML = `
      <div class="rc-badge" style="color:${color}">${isWinner && !tie ? '🥇 الفائز' : '🥈 المنافس'}</div>
      <div class="rc-name" style="color:${color}">${name}</div>
      <div class="rc-score" style="color:${color}">${score}</div>
      <div class="rc-pts">نقاط</div>`;
    return div;
  };

  if (tie) {
    podium.appendChild(makeCard(G.nameA, G.scoreA, COLORS.a, false));
    const vs = document.createElement('div'); vs.className = 'vs-divider'; vs.textContent = '='; podium.appendChild(vs);
    podium.appendChild(makeCard(G.nameB, G.scoreB, COLORS.b, false));
  } else if (aWins) {
    podium.appendChild(makeCard(G.nameB, G.scoreB, COLORS.b, false));
    const vs = document.createElement('div'); vs.className = 'vs-divider'; vs.textContent = 'VS'; podium.appendChild(vs);
    podium.appendChild(makeCard(G.nameA, G.scoreA, COLORS.a, true));
  } else {
    podium.appendChild(makeCard(G.nameA, G.scoreA, COLORS.a, false));
    const vs = document.createElement('div'); vs.className = 'vs-divider'; vs.textContent = 'VS'; podium.appendChild(vs);
    podium.appendChild(makeCard(G.nameB, G.scoreB, COLORS.b, true));
  }

  showScreen('results');
  launchConfetti();
}

function launchConfetti() {
  const colors = [COLORS.a, COLORS.b, '#f5c518', '#ffffff', '#ff8c00'];
  for (let i = 0; i < 90; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'cp';
      const size = 6 + Math.random() * 9;
      el.style.cssText = `left:${Math.random()*100}vw;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${2.5+Math.random()*3}s;animation-delay:${Math.random()*0.5}s;border-radius:${Math.random()>0.5?'50%':'2px'}`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 6000);
    }, i * 35);
  }
}

function restartGame() {
  document.getElementById('snd-bg').pause();
  document.getElementById('music-fab').style.display = 'none';
  showScreen('setup');
}

/* ── EDITOR ── */
function buildEditor() {
  const list = document.getElementById('eq-list');
  list.innerHTML = '';
  QUESTIONS.forEach((q, i) => {
    const det = document.createElement('details');
    det.className = 'eq-item';
    det.innerHTML = `
      <summary>س${i+1}: ${q.q.substring(0,30)}${q.q.length>30?'…':''}</summary>
      <div class="ef"><label>نص السؤال</label><input type="text" id="eq-${i}-q" value="${esc(q.q)}"></div>
      ${q.opts.map((o,j)=>`<div class="ef"><label>خيار ${'أبجد'[j]}</label><input type="text" id="eq-${i}-o${j}" value="${esc(o)}"></div>`).join('')}
      <div class="ef">
        <label>الإجابة الصحيحة</label>
        <div class="correct-sel" id="eq-${i}-cs">
          ${'أبجد'.split('').map((l,j)=>`<button onclick="toggleCorrect(${i},${j})" id="eq-${i}-c${j}" class="${j===q.correct?'on':''}">${l}</button>`).join('')}
        </div>
      </div>
      <div class="ef-img-wrap">
        <label>📷 صورة السؤال (اختياري)</label>
        <div class="img-upload-area" onclick="document.getElementById('eq-${i}-file').click()">
          <input type="file" id="eq-${i}-file" accept="image/*" onchange="loadQImage(${i}, this)">
          <div class="img-upload-btn">اختر صورة أو اسحبها هنا</div>
          <img id="eq-${i}-preview" class="img-preview${q.img?' visible':''}" src="${q.img||''}">
          <button class="img-clear-btn${q.img?' visible':''}" id="eq-${i}-clear" onclick="clearQImage(event,${i})">✕ حذف الصورة</button>
        </div>
      </div>`;
    list.appendChild(det);
  });
}

function loadQImage(qi, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    QUESTIONS[qi].img = e.target.result;
    const preview = document.getElementById(`eq-${qi}-preview`);
    const clearBtn = document.getElementById(`eq-${qi}-clear`);
    preview.src = e.target.result;
    preview.classList.add('visible');
    clearBtn.classList.add('visible');
  };
  reader.readAsDataURL(file);
}

function clearQImage(e, qi) {
  e.stopPropagation();
  QUESTIONS[qi].img = '';
  const preview = document.getElementById(`eq-${qi}-preview`);
  const clearBtn = document.getElementById(`eq-${qi}-clear`);
  preview.src = '';
  preview.classList.remove('visible');
  clearBtn.classList.remove('visible');
  const fileInput = document.getElementById(`eq-${qi}-file`);
  if (fileInput) fileInput.value = '';
}

function esc(s) { return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function toggleCorrect(qi, opt) {
  for (let j = 0; j < 4; j++)
    document.getElementById(`eq-${qi}-c${j}`).classList.toggle('on', j === opt);
}

function saveEditor() {
  for (let i = 0; i < 30; i++) {
    const qEl = document.getElementById(`eq-${i}-q`);
    if (!qEl) continue;
    QUESTIONS[i].q = qEl.value;
    QUESTIONS[i].opts = [0,1,2,3].map(j => document.getElementById(`eq-${i}-o${j}`)?.value || '');
    const sel = document.querySelector(`#eq-${i}-cs .on`);
    if (sel) QUESTIONS[i].correct = parseInt(sel.id.split('c').pop());
    const summ = document.querySelector(`#eq-list details:nth-child(${i+1}) summary`);
    if (summ) summ.textContent = `س${i+1}: ${QUESTIONS[i].q.substring(0,30)}${QUESTIONS[i].q.length>30?'…':''}`;
  }
  toggleEditor();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = '✓ تم حفظ الأسئلة';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

function toggleEditor() { document.getElementById('editor').classList.toggle('open'); }

/* ── UTILS ── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
