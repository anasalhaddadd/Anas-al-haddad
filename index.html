<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title> المسابقة الثقافية </title>

<style>
body {
    font-family: "Tahoma";
    background: linear-gradient(to bottom, #fff8e1, #fceabb);
    text-align: center;
    margin: 0;
}

/* Header */
h1 {
    background: gold;
    padding: 15px;
    margin: 0;
}

/* Teams */
#scoreboard {
    display: flex;
    justify-content: space-around;
    padding: 10px;
    font-size: 20px;
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    padding: 20px;
}

.box {
    background: white;
    border: 2px solid gold;
    padding: 30px;
    font-size: 22px;
    cursor: pointer;
    border-radius: 10px;
}

.box.used {
    background: #ccc;
    cursor: not-allowed;
}

/* Popup */
#popup {
    display: none;
    position: fixed;
    top: 20%;
    left: 20%;
    width: 60%;
    background: white;
    border: 3px solid gold;
    padding: 20px;
}

.answer {
    display: block;
    margin: 10px;
    padding: 10px;
    background: #eee;
    cursor: pointer;
}

/* Feedback */
#feedback {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    font-size: 60px;
    color: white;
    align-items: center;
    justify-content: center;
}
.correct { background: rgba(0,200,0,0.8); }
.wrong { background: rgba(200,0,0,0.8); }

</style>
</head>

<body>

<h1>🎤 مسابقة الصف 🎤</h1>

<div id="scoreboard">
    <div>الفريق 1: <span id="team1">0</span></div>
    <div>الفريق 2: <span id="team2">0</span></div>
</div>

<div class="grid" id="grid"></div>

<div id="popup">
    <h2 id="question"></h2>
    <div id="answers"></div>
</div>

<div id="feedback"></div>

<audio id="correctSound" src="sounds/correct.mp3"></audio>
<audio id="wrongSound" src="sounds/wrong.mp3"></audio>

<script>
let questions = [
    {
        question: "ما عاصمة المغرب؟",
        options: ["طنجة", "الرباط", "فاس", "مراكش"],
        correct: 1
    },
    {
        question: "2 + 2 = ؟",
        options: ["3", "4", "5", "6"],
        correct: 1
    }
];

let currentTeam = 1;
let scores = [0,0];

const grid = document.getElementById("grid");

questions.forEach((q, index) => {
    let box = document.createElement("div");
    box.className = "box";
    box.innerText = index + 1;

    box.onclick = () => openQuestion(index, box);

    grid.appendChild(box);
});

function openQuestion(index, box) {
    if (box.classList.contains("used")) return;

    document.getElementById("popup").style.display = "block";
    document.getElementById("question").innerText = questions[index].question;

    let answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    questions[index].options.forEach((opt, i) => {
        let btn = document.createElement("div");
        btn.className = "answer";
        btn.innerText = opt;

        btn.onclick = () => checkAnswer(i, questions[index].correct, box);

        answersDiv.appendChild(btn);
    });
}

function checkAnswer(selected, correct, box) {
    document.getElementById("popup").style.display = "none";

    let feedback = document.getElementById("feedback");

    if (selected === correct) {
        scores[currentTeam - 1] += 1;
        document.getElementById("team" + currentTeam).innerText = scores[currentTeam - 1];

        feedback.className = "correct";
        feedback.innerText = "✔ إجابة صحيحة!";
        document.getElementById("correctSound").play();
    } else {
        feedback.className = "wrong";
        feedback.innerText = "✖ إجابة خاطئة!";
        document.getElementById("wrongSound").play();
    }

    feedback.style.display = "flex";

    setTimeout(() => {
        feedback.style.display = "none";
    }, 2000);

    box.classList.add("used");

    currentTeam = currentTeam === 1 ? 2 : 1;
}
</script>

</body>
</html>
