<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>المسابقة الثقافية</title>

<style>

/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: "Tahoma", sans-serif;
    background: radial-gradient(circle at center, #1a1a2e, #0f0f1a);
    color: white;
}

/* ===== HEADER ===== */
header {
    text-align: center;
    font-size: 40px;
    padding: 20px;
    background: linear-gradient(to right, #caa64b, #f5d36a, #caa64b);
    color: black;
    font-weight: bold;
    letter-spacing: 2px;
}

/* ===== SCOREBOARD ===== */
#scoreboard {
    display: flex;
    justify-content: space-around;
    padding: 15px;
    font-size: 22px;
    background: #111;
    border-bottom: 2px solid gold;
}

.team {
    padding: 10px 20px;
    border: 2px solid gold;
    border-radius: 10px;
}

.active {
    background: gold;
    color: black;
}

/* ===== GRID ===== */
.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 20px;
    padding: 30px;
}

.box {
    background: #111;
    border: 3px solid gold;
    border-radius: 15px;
    font-size: 30px;
    padding: 40px;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
}

.box:hover {
    transform: scale(1.1);
    background: gold;
    color: black;
}

.box.used {
    background: #444;
    color: #888;
    border-color: #666;
    cursor: not-allowed;
}

/* ===== POPUP ===== */
#popup {
    display: none;
    position: fixed;
    top: 10%;
    left: 10%;
    width: 80%;
    background: #0f0f1a;
    border: 4px solid gold;
    padding: 30px;
    text-align: center;
    box-shadow: 0 0 30px gold;
}

#question {
    font-size: 30px;
    margin-bottom: 20px;
}

/* ANSWERS */
.answer {
    margin: 10px;
    padding: 15px;
    background: #1a1a2e;
    border: 2px solid gold;
    cursor: pointer;
    font-size: 20px;
    border-radius: 10px;
    transition: 0.2s;
}

.answer:hover {
    background: gold;
    color: black;
}

/* ===== FEEDBACK ===== */
#feedback {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    font-size: 80px;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.correct {
    background: rgba(0, 200, 0, 0.9);
}

.wrong {
    background: rgba(200, 0, 0, 0.9);
}

</style>
</head>

<body>

<header>🎤 المسابقة الثقافية 🎤</header>

<div id="scoreboard">
    <div id="t1" class="team">فريق فرسان العلوم: <span>0</span></div>
    <div id="t2" class="team">فريق التحدي : <span>0</span></div>
</div>

<div class="grid" id="grid"></div>

<!-- POPUP -->
<div id="popup">
    <div id="question"></div>
    <div id="answers"></div>
</div>

<!-- FEEDBACK -->
<div id="feedback"></div>

<!-- SOUNDS -->
<audio id="correctSound" src="sounds/correct.mp3"></audio>
<audio id="wrongSound" src="sounds/wrong.mp3"></audio>

<script>

/* ===== QUESTIONS ===== */
let questions = [
    {
        question: "ما عاصمة المغرب؟",
        options: ["طنجة", "الرباط", "فاس", "مراكش"],
        correct: 1
    },
    {
        question: "5 × 3 = ؟",
        options: ["15", "10", "20", "8"],
        correct: 0
    }
];

/* ===== GAME STATE ===== */
let currentTeam = 1;
let scores = [0, 0, 0];

const grid = document.getElementById("grid");

/* ===== CREATE GRID ===== */
for (let i = 0; i < 15; i++) {
    let box = document.createElement("div");
    box.className = "box";
    box.innerText = i + 1;

    box.onclick = () => openQuestion(i, box);

    grid.appendChild(box);
}

/* ===== OPEN QUESTION ===== */
function openQuestion(index, box) {
    if (box.classList.contains("used")) return;

    let q = questions[index % questions.length];

    document.getElementById("popup").style.display = "block";
    document.getElementById("question").innerText = q.question;

    let answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.options.forEach((opt, i) => {
        let btn = document.createElement("div");
        btn.className = "answer";
        btn.innerText = opt;

        btn.onclick = () => checkAnswer(i, q.correct, box);

        answersDiv.appendChild(btn);
    });
}

/* ===== CHECK ANSWER ===== */
function checkAnswer(selected, correct, box) {
    document.getElementById("popup").style.display = "none";

    let feedback = document.getElementById("feedback");

    if (selected === correct) {
        scores[currentTeam - 1]++;
        document.querySelector("#t" + currentTeam + " span").innerText = scores[currentTeam - 1];

        feedback.className = "correct";
        feedback.innerText = "✔ إجابة صحيحة!";
        document.getElementById("correctSound").play();
    } else {
        feedback.className = "wrong";
        feedback.innerText = "✖ إجابة خاطئة!";
        document.getElementById("wrongSound").play();
    }

    feedback.style.display = "flex";

    setTimeout(() => {
        feedback.style.display = "none";
    }, 2000);

    box.classList.add("used");

    currentTeam = currentTeam % 3 + 1;
    updateActiveTeam();
}

/* ===== ACTIVE TEAM ===== */
function updateActiveTeam() {
    for (let i = 1; i <= 3; i++) {
        document.getElementById("t" + i).classList.remove("active");
    }
    document.getElementById("t" + currentTeam).classList.add("active");
}

updateActiveTeam();

</script>

</body>
</html>
